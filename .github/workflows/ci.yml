name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  # ── Secret scan ───────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks (full scan)
        run: gitleaks detect --no-git --source . -v --redact --report-format sarif --report-path results.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint, format, test
    needs: secret-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm install \
            clsx \
            class-variance-authority \
            tailwindcss-animate \
            lucide-react
          npm install --save-dev \
            jest \
            jest-environment-jsdom \
            @testing-library/react \
            @testing-library/jest-dom \
            @testing-library/user-event \
            @types/jest \
            eslint \
            eslint-config-next \
            @next/eslint-plugin-next \
            @typescript-eslint/parser \
            @typescript-eslint/eslint-plugin \
            eslint-plugin-react \
            eslint-plugin-react-hooks \
            prettier \
            prettier-plugin-tailwindcss

      - name: Lint (ESLint)
        run: ENV=unittest make lint-fe

      - name: Format check (Prettier)
        run: ENV=unittest make format-fe

      - name: Run tests
        run: ENV=unittest make test-fe
